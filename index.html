        window.addEventListener("unhandledrejection", function () { setTimeout(showFallback, 0); });
        // Annule le fallback dès qu'un noeud est ajouté à #root.
        var root = document.getElementById("root");
        if (root && "MutationObserver" in window) {
          var obs = new MutationObserver(function () {
            if (root.childElementCount > 0) {
              clearTimeout(t);
              var f = document.getElementById("boot-fallback");
              if (f) f.style.display = "none";
              obs.disconnect();
            }
          });
          obs.observe(root, { childList: true });
        }
        var btn = document.getElementById("boot-fallback-reload");
        if (btn) btn.addEventListener("click", function () {
          try { sessionStorage.removeItem("vite-preload-reloaded"); } catch (e) {}
          window.location.replace("/?reload=" + Date.now());
        });
        var wipe = document.getElementById("boot-fallback-wipe");
        if (wipe) wipe.addEventListener("click", function () {
          try { sessionStorage.removeItem("vite-preload-reloaded"); } catch (e) {}
          cleanup().finally(function () { window.location.replace("/?cache-clean=" + Date.now()); });
        });
      })();
